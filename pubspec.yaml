name: quran_app
description: "A new Flutter project."
publish_to: 'none' # Prevent accidental publishing

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_riverpod: ^2.5.1
  lucide_icons_flutter: ^3.1.10
  just_audio: ^0.10.5
  flutter_svg: ^2.2.4
  dio: ^5.9.2
  path_provider: ^2.1.5
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_launcher_icons: ^0.14.4
  visibility_detector: ^0.4.0+2
  intl: ^0.20.2
  adhan: ^2.0.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  quran: ^1.4.1
  shimmer: ^3.0.0
  qcf_quran_plus: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/metadata/
    - assets/reciters/
    - assets/database/translations/
    - assets/database/tafseer/

  fonts:
    - family: Indo Park
      fonts:
        - asset: assets/fonts/indopark.ttf
    - family: Uthmanic
      fonts:
        - asset: assets/fonts/KFGQPC Uthmanic Script HAFS Regular.otf
    